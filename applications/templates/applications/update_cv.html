{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-7">

        <div class="tk-card tk-card-pad">

            <h2 class="mb-4">Update CV</h2>

            <p class="text-muted">
                <strong>Job:</strong> {{ application.job.title }}
            </p>

            {% if application.cv_file %}
            <div class="alert alert-success">
                Current CV:
                <a href="{{ application.cv_file.url }}" target="_blank">
                    View CV
                </a>
            </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">
                        Upload new CV
                    </label>

                    <input
                        type="file"
                        name="cv_file"
                        class="form-control"
                        required
                    >
                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-tk-red">
                        Save CV
                    </button>

                    <a
                        href="/applications/my-applications/"
                        class="btn btn-tk-outline">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
