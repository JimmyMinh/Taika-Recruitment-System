{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="tk-card tk-card-pad">

            <div class="text-center mb-4">

                <span class="tk-avatar tk-avatar-lg">
                    {{ request.user.username|slice:":2"|upper }}
                </span>

                <h2 class="mt-3">
                    Edit Profile
                </h2>

                <p class="text-muted">
                    Update your personal information
                </p>

            </div>

            <form method="post">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ request.user.username }}"
                            disabled>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            value="{{ request.user.email }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Phone
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            value="{{ profile.phone }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="address"
                            value="{{ profile.address }}">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">
                            Education
                        </label>

                        <textarea
                            class="form-control"
                            rows="4"
                            name="education">{{ profile.education }}</textarea>

                    </div>

                    <div class="col-12 mb-4">

                        <label class="form-label">
                            Experience
                        </label>

                        <textarea
                            class="form-control"
                            rows="6"
                            name="experience">{{ profile.experience }}</textarea>

                    </div>

                </div>

                <div class="d-flex justify-content-between">

                    <a href="/users/profile/" class="btn btn-tk-outline">
                        Cancel
                    </a>

                    <button
                        type="submit"
                        class="btn btn-tk-red">
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
