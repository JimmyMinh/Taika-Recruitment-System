{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-6">

        <div class="tk-card tk-card-pad">

            <div class="text-center mb-4">
                <img src="{% static 'images/logo.jpg' %}" style="height:70px;" alt="Logo">

                <h2 class="mt-3">
                    Create Account
                </h2>

                <p class="text-muted">
                    Join Taika Seafood Recruitment System
                </p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        placeholder="Confirm password"
                        required>
                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Account Type
                    </label>

                    <div class="role-toggle">

                        <button
                            type="button"
                            id="candidate-btn"
                            class="role-btn active">

                            Candidate

                        </button>

                        <button
                            type="button"
                            id="hr-btn"
                            class="role-btn">

                            HR

                        </button>

                    </div>

                    <input
                        type="hidden"
                        id="role"
                        name="role"
                        value="candidate">

                </div>

                <div
                    class="mb-3"
                    id="hr-code-box"
                    style="display:none;">

                    <label class="form-label">
                        HR Code
                    </label>

                    <input
                        type="text"
                        id="hr_code"
                        name="hr_code"
                        class="form-control"
                        placeholder="Enter company HR code">

                    <small class="text-muted">
                        This code is provided by the company.
                    </small>

                </div>

                <button class="btn btn-tk-red w-100">
                    Register
                </button>

            </form>

            <hr>

            <div class="text-center">

                Already have an account?

                <a href="/users/login/">
                    Login
                </a>

            </div>

        </div>

    </div>
</div>

<script>

const candidateBtn = document.getElementById("candidate-btn");
const hrBtn = document.getElementById("hr-btn");

const roleInput = document.getElementById("role");

const hrBox = document.getElementById("hr-code-box");
const hrInput = document.getElementById("hr_code");


candidateBtn.onclick = function () {

    roleInput.value = "candidate";

    candidateBtn.classList.add("active");
    hrBtn.classList.remove("active");

    hrBox.style.display = "none";
    hrInput.required = false;
    hrInput.value = "";

}


hrBtn.onclick = function () {

    roleInput.value = "hr";

    hrBtn.classList.add("active");
    candidateBtn.classList.remove("active");

    hrBox.style.display = "block";
    hrInput.required = true;

}

</script>

{% endblock %}
