{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-6">

        <div class="tk-card tk-card-pad">

            <div class="text-center mb-4">
                <img src="{% static 'images/logo.jpg' %}" style="height:70px;" alt="Logo">
                <h2 class="mt-3">Create Account</h2>
                <p class="text-muted">
                    Join Taika Seafood Recruitment System
                </p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required>
                </div>



                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>
                </div>


                <button class="btn btn-tk-red w-100">
                    Register
                </button>

            </form>

            <hr>

            <div class="text-center">
                Already have an account?

                <a href="/users/login/">
                    Login
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
