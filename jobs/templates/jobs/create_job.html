{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="tk-card tk-card-pad">

            <div class="mb-4">

                <h2>Edit Job</h2>

                <p class="text-muted">
                    Update information for this recruitment position.
                </p>

            </div>

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Job Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        value="{{ job.title }}"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                        name="description"
                        rows="5"
                        class="form-control"
                        required>{{ job.description }}</textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Requirements
                    </label>

                    <textarea
                        name="requirements"
                        rows="5"
                        class="form-control"
                        required>{{ job.requirements }}</textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Location
                        </label>

                        <input
                            type="text"
                            name="location"
                            value="{{ job.location }}"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Salary
                        </label>

                        <input
                            type="number"
                            name="salary"
                            value="{{ job.salary }}"
                            class="form-control">

                    </div>

                </div>

                <div class="d-flex justify-content-between mt-4">

                    <a
                        href="/"
                        class="btn btn-tk-outline">

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-tk-red">

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
